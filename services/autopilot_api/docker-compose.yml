services:
  api:
    build:
      context: ../..
      dockerfile: services/autopilot_api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://classic:classic@postgres:5432/classic
      SYNC_DATABASE_URL: postgresql://classic:classic@postgres:5432/classic
      REDIS_URL: redis://redis:6379/0
      APP_ENV: local
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../..
      dockerfile: services/autopilot_api/Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+asyncpg://classic:classic@postgres:5432/classic
      SYNC_DATABASE_URL: postgresql://classic:classic@postgres:5432/classic
      REDIS_URL: redis://redis:6379/0
      APP_ENV: local
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: ../..
      dockerfile: services/autopilot_api/Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+asyncpg://classic:classic@postgres:5432/classic
      SYNC_DATABASE_URL: postgresql://classic:classic@postgres:5432/classic
      REDIS_URL: redis://redis:6379/0
      APP_ENV: local
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: classic
      POSTGRES_PASSWORD: classic
      POSTGRES_DB: classic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../sql/postgres_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
