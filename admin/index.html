<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classic Productions CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --gold-light: #e2c285; --dark: #121212; --darker: #0a0a0a; --light: #f4f1ea; --border: rgba(197,160,89,0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--dark); color: var(--light); min-height: 100vh; display: flex; }
        aside { width: 240px; background: var(--darker); border-right: 1px solid var(--border); padding: 30px 0; position: fixed; height: 100vh; overflow-y: auto; }
        aside h2 { color: var(--gold); padding: 0 25px 25px; font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 25px; color: var(--light); cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(197,160,89,0.08); }
        .nav-item.active { background: rgba(197,160,89,0.12); border-left-color: var(--gold); color: var(--gold); }
        .nav-item i { width: 20px; }
        .logout-btn { margin: 30px 25px 0; padding: 10px; background: none; border: 1px solid var(--border); color: #999; cursor: pointer; width: calc(100% - 50px); border-radius: 4px; }
        .logout-btn:hover { color: white; border-color: var(--gold); }
        main { margin-left: 240px; flex: 1; padding: 40px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .page-header h1 { font-size: 1.8rem; color: var(--gold); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 25px; border-radius: 6px; }
        .stat-card h4 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 10px; }
        .stat-card .value { font-size: 2rem; color: var(--gold); font-weight: 700; }
        .stat-card .sub { font-size: 0.8rem; color: #666; margin-top: 5px; }
        .panel { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 6px; padding: 25px; margin-bottom: 25px; }
        .panel h3 { color: var(--gold); margin-bottom: 18px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--gold); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1.5px; }
        tr:hover { background: rgba(197,160,89,0.04); }
        .btn { padding: 8px 16px; background: var(--gold); color: var(--dark); border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .btn:hover { background: var(--gold-light); }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
        .btn-danger { background: #d32f2f; color: white; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-outline { background: none; border: 1px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: var(--gold); color: var(--dark); }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
        .badge-vip { background: var(--gold); color: var(--dark); }
        .badge-success { background: rgba(76,175,80,0.2); color: #4caf50; }
        .badge-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .badge-danger { background: rgba(244,67,54,0.2); color: #f44336; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; border-radius: 4px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1c1c1c; border: 1px solid var(--gold); padding: 35px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 6px; }
        .modal-content h3 { color: var(--gold); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--gold); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; border-radius: 4px; font-family: inherit;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .view { display: none; }
        .view.active { display: block; }
        .chart-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .chart-bar .label { width: 180px; font-size: 0.85rem; }
        .chart-bar .bar { flex: 1; height: 22px; background: rgba(197,160,89,0.15); border-radius: 3px; position: relative; overflow: hidden; }
        .chart-bar .fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
        .chart-bar .val { width: 80px; text-align: right; font-size: 0.85rem; color: var(--gold); }
        .empty { text-align: center; padding: 40px; color: #666; }
        @media (max-width: 768px) {
            aside { width: 60px; }
            aside h2, .nav-item span, .logout-btn { display: none; }
            main { margin-left: 60px; padding: 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<aside>
    <h2>Classic CRM</h2>
    <nav>
        <div class="nav-item active" data-view="dashboard"><i class="fas fa-chart-line"></i><span>Dashboard</span></div>
        <div class="nav-item" data-view="customers"><i class="fas fa-users"></i><span>Customers</span></div>
        <div class="nav-item" data-view="events"><i class="fas fa-calendar-star"></i><span>Events</span></div>
        <div class="nav-item" data-view="bookings"><i class="fas fa-ticket-alt"></i><span>Bookings</span></div>
        <div class="nav-item" data-view="reservations"><i class="fas fa-utensils"></i><span>Reservations</span></div>
        <div class="nav-item" data-view="messages"><i class="fas fa-envelope"></i><span>Messages</span></div>
        <div class="nav-item" data-view="subscribers"><i class="fas fa-paper-plane"></i><span>Subscribers</span></div>
    </nav>
    <button class="logout-btn" onclick="logout()">Logout</button>
</aside>

<main>
    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
        <div class="page-header"><h1>Dashboard</h1><span id="welcome"></span></div>
        <div class="stats-grid" id="stats-grid"></div>
        <div class="panel">
            <h3>Revenue by Event</h3>
            <div id="revenue-chart"></div>
        </div>
        <div class="panel">
            <h3>Bookings — Last 7 Days</h3>
            <div id="bookings-chart"></div>
        </div>
    </div>

    <!-- CUSTOMERS -->
    <div class="view" id="view-customers">
        <div class="page-header">
            <h1>Customers</h1>
            <button class="btn" onclick="openCustomerModal()"><i class="fas fa-plus"></i> Add Customer</button>
        </div>
        <div class="search-bar">
            <input type="text" id="customer-search" placeholder="Search by name or email...">
            <button class="btn-outline btn" onclick="loadCustomers()">Search</button>
        </div>
        <div class="panel"><table id="customers-table"></table></div>
    </div>

    <!-- EVENTS -->
    <div class="view" id="view-events">
        <div class="page-header">
            <h1>Events</h1>
            <button class="btn" onclick="openEventModal()"><i class="fas fa-plus"></i> New Event</button>
        </div>
        <div class="panel"><table id="events-table"></table></div>
    </div>

    <!-- BOOKINGS -->
    <div class="view" id="view-bookings">
        <div class="page-header"><h1>Ticket Bookings</h1></div>
        <div class="panel"><table id="bookings-table"></table></div>
    </div>

    <!-- RESERVATIONS -->
    <div class="view" id="view-reservations">
        <div class="page-header"><h1>Table Reservations</h1></div>
        <div class="panel"><table id="reservations-table"></table></div>
    </div>

    <!-- MESSAGES -->
    <div class="view" id="view-messages">
        <div class="page-header"><h1>Contact Messages</h1></div>
        <div class="panel"><table id="messages-table"></table></div>
    </div>

    <!-- SUBSCRIBERS -->
    <div class="view" id="view-subscribers">
        <div class="page-header"><h1>Newsletter Subscribers</h1></div>
        <div class="panel"><table id="subscribers-table"></table></div>
    </div>
</main>

<!-- CUSTOMER MODAL -->
<div class="modal" id="customer-modal">
    <div class="modal-content">
        <h3 id="customer-modal-title">Add Customer</h3>
        <form id="customer-form">
            <input type="hidden" name="id">
            <div class="form-row">
                <div class="form-group"><label>First Name</label><input type="text" name="first_name" required></div>
                <div class="form-group"><label>Last Name</label><input type="text" name="last_name" required></div>
            </div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Phone</label><input type="tel" name="phone"></div>
            <div class="form-group"><label><input type="checkbox" name="vip_status"> VIP Status</label></div>
            <div class="form-group"><label>Notes</label><textarea name="notes" rows="3"></textarea></div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeModal('customer-modal')">Cancel</button>
                <button type="submit" class="btn">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- EVENT MODAL -->
<div class="modal" id="event-modal">
    <div class="modal-content">
        <h3 id="event-modal-title">New Event</h3>
        <form id="event-form">
            <input type="hidden" name="id">
            <div class="form-group"><label>Title</label><input type="text" name="title" required></div>
            <div class="form-row">
                <div class="form-group"><label>Genre</label><input type="text" name="genre"></div>
                <div class="form-group"><label>Venue</label><input type="text" name="venue"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Date</label><input type="date" name="event_date" required></div>
                <div class="form-group"><label>Time</label><input type="time" name="event_time"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Ticket Price ($)</label><input type="number" name="ticket_price" step="0.01" min="0"></div>
                <div class="form-group"><label>Capacity</label><input type="number" name="capacity" min="1"></div>
            </div>
            <div class="form-group"><label>Image URL</label><input type="url" name="image_url"></div>
            <div class="form-group"><label>Description</label><textarea name="description" rows="3"></textarea></div>
            <div class="form-group"><label>Status</label>
                <select name="status">
                    <option value="active">Active</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeModal('event-modal')">Cancel</button>
                <button type="submit" class="btn">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- CUSTOMER DETAIL MODAL -->
<div class="modal" id="customer-detail-modal">
    <div class="modal-content" id="customer-detail-content"></div>
</div>

<script>
const API = '/admin/api';

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

async function api(path, options = {}) {
    options.credentials = 'same-origin';
    if (options.body && typeof options.body === 'object') {
        options.headers = { ...options.headers, 'Content-Type': 'application/json' };
        options.body = JSON.stringify(options.body);
    }
    const res = await fetch(API + path, options);
    if (res.status === 401) { window.location.href = '/admin/login.html'; return; }
    return res.json();
}

// Navigation
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        item.classList.add('active');
        const view = item.dataset.view;
        document.getElementById('view-' + view).classList.add('active');
        if (view === 'dashboard') loadDashboard();
        if (view === 'customers') loadCustomers();
        if (view === 'events') loadEvents();
        if (view === 'bookings') loadBookings();
        if (view === 'reservations') loadReservations();
        if (view === 'messages') loadMessages();
        if (view === 'subscribers') loadSubscribers();
    });
});

async function logout() {
    await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
    window.location.href = '/admin/login.html';
}

// Check auth & username
fetch('/auth/me', { credentials: 'same-origin' }).then(r => r.json()).then(d => {
    if (!d.authenticated) window.location.href = '/admin/login.html';
    else document.getElementById('welcome').textContent = 'Welcome, ' + d.username;
});

// ===== DASHBOARD =====
async function loadDashboard() {
    const d = await api('/analytics');
    if (!d) return;
    document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><h4>Total Revenue</h4><div class="value">$${Number(d.totalRevenue).toFixed(2)}</div><div class="sub">from ${d.totalBookings} bookings</div></div>
        <div class="stat-card"><h4>Customers</h4><div class="value">${d.totalCustomers}</div><div class="sub">${d.vipCustomers} VIP</div></div>
        <div class="stat-card"><h4>Active Events</h4><div class="value">${d.upcomingEvents}</div><div class="sub">${d.totalEvents} total</div></div>
        <div class="stat-card"><h4>Pending Reservations</h4><div class="value">${d.pendingReservations}</div></div>
        <div class="stat-card"><h4>Unread Messages</h4><div class="value">${d.unreadMessages}</div></div>
        <div class="stat-card"><h4>Subscribers</h4><div class="value">${d.subscribers}</div></div>
    `;
    const maxRev = Math.max(...d.revenueByEvent.map(e => e.revenue), 1);
    document.getElementById('revenue-chart').innerHTML = d.revenueByEvent.length
        ? d.revenueByEvent.map(e => `
            <div class="chart-bar">
                <div class="label">${e.title}</div>
                <div class="bar"><div class="fill" style="width:${(e.revenue/maxRev*100)}%"></div></div>
                <div class="val">$${Number(e.revenue).toFixed(0)}</div>
            </div>`).join('')
        : '<div class="empty">No revenue yet</div>';

    const maxBookings = Math.max(...d.recentBookings.map(b => b.count), 1);
    document.getElementById('bookings-chart').innerHTML = d.recentBookings.length
        ? d.recentBookings.map(b => `
            <div class="chart-bar">
                <div class="label">${b.day}</div>
                <div class="bar"><div class="fill" style="width:${(b.count/maxBookings*100)}%"></div></div>
                <div class="val">${b.count} • $${Number(b.revenue).toFixed(0)}</div>
            </div>`).join('')
        : '<div class="empty">No bookings this week</div>';
}

// ===== CUSTOMERS =====
async function loadCustomers() {
    const q = document.getElementById('customer-search').value;
    const rows = await api('/customers?q=' + encodeURIComponent(q));
    if (!rows) return;
    document.getElementById('customers-table').innerHTML = `
        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Total Spent</th><th>Joined</th><th></th></tr></thead>
        <tbody>${rows.length ? rows.map(c => `
            <tr>
                <td><a href="#" onclick="viewCustomer(${c.id}); return false;" style="color:var(--gold)">${escapeHtml(c.first_name)} ${escapeHtml(c.last_name)}</a></td>
                <td>${escapeHtml(c.email)}</td>
                <td>${escapeHtml(c.phone) || '—'}</td>
                <td>${c.vip_status ? '<span class="badge badge-vip">VIP</span>' : '—'}</td>
                <td>$${Number(c.total_spent).toFixed(2)}</td>
                <td>${escapeHtml(c.created_at.split(' ')[0])}</td>
                <td>
                    <button class="btn btn-sm" onclick='openCustomerModal(${JSON.stringify(c)})'>Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})">Delete</button>
                </td>
            </tr>`).join('') : '<tr><td colspan="7" class="empty">No customers yet</td></tr>'}</tbody>
    `;
}
function openCustomerModal(c = null) {
    const form = document.getElementById('customer-form');
    form.reset();
    document.getElementById('customer-modal-title').textContent = c ? 'Edit Customer' : 'Add Customer';
    if (c) {
        form.id.value = c.id;
        form.first_name.value = c.first_name;
        form.last_name.value = c.last_name;
        form.email.value = c.email;
        form.phone.value = c.phone || '';
        form.vip_status.checked = !!c.vip_status;
        form.notes.value = c.notes || '';
    } else form.id.value = '';
    document.getElementById('customer-modal').classList.add('active');
}
document.getElementById('customer-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    data.vip_status = !!data.vip_status;
    const id = data.id; delete data.id;
    await api(id ? `/customers/${id}` : '/customers', { method: id ? 'PUT' : 'POST', body: data });
    closeModal('customer-modal');
    loadCustomers();
});
async function deleteCustomer(id) {
    if (!confirm('Delete this customer?')) return;
    await api('/customers/' + id, { method: 'DELETE' });
    loadCustomers();
}
async function viewCustomer(id) {
    const c = await api('/customers/' + id);
    if (!c) return;
    document.getElementById('customer-detail-content').innerHTML = `
        <h3>${escapeHtml(c.first_name)} ${escapeHtml(c.last_name)} ${c.vip_status ? '<span class="badge badge-vip">VIP</span>' : ''}</h3>
        <p style="margin: 10px 0; color: #aaa;">${escapeHtml(c.email)} &bull; ${escapeHtml(c.phone) || 'No phone'}</p>
        <p style="margin-bottom: 20px;"><strong style="color:var(--gold)">Total spent:</strong> $${Number(c.total_spent).toFixed(2)}</p>
        ${c.notes ? `<div class="panel" style="background:rgba(197,160,89,0.05);"><strong>Notes:</strong> ${escapeHtml(c.notes)}</div>` : ''}
        <h4 style="color:var(--gold); margin: 20px 0 10px;">Bookings (${c.bookings.length})</h4>
        ${c.bookings.length ? c.bookings.map(b => `<div style="padding:8px 0; border-bottom: 1px solid var(--border);">${escapeHtml(b.event_title) || 'Unknown event'} &mdash; ${Number(b.quantity)} ticket(s) &mdash; $${Number(b.total_price).toFixed(2)}</div>`).join('') : '<p style="color:#666;">None</p>'}
        <h4 style="color:var(--gold); margin: 20px 0 10px;">Reservations (${c.reservations.length})</h4>
        ${c.reservations.length ? c.reservations.map(r => `<div style="padding:8px 0; border-bottom: 1px solid var(--border);">${escapeHtml(r.reservation_date)} ${escapeHtml(r.reservation_time) || ''} &mdash; ${Number(r.party_size)} ppl &mdash; <span class="badge badge-${r.status === 'confirmed' ? 'success' : r.status === 'cancelled' ? 'danger' : 'pending'}">${escapeHtml(r.status)}</span></div>`).join('') : '<p style="color:#666;">None</p>'}
        <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal('customer-detail-modal')">Close</button></div>
    `;
    document.getElementById('customer-detail-modal').classList.add('active');
}

// ===== EVENTS =====
async function loadEvents() {
    const rows = await api('/events');
    if (!rows) return;
    document.getElementById('events-table').innerHTML = `
        <thead><tr><th>Title</th><th>Date</th><th>Genre</th><th>Price</th><th>Bookings</th><th>Revenue</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows.length ? rows.map(e => `
            <tr>
                <td><strong>${escapeHtml(e.title)}</strong><br><small style="color:#888">${escapeHtml(e.venue) || ''}</small></td>
                <td>${escapeHtml(e.event_date)} ${escapeHtml(e.event_time) || ''}</td>
                <td>${escapeHtml(e.genre) || '—'}</td>
                <td>$${Number(e.ticket_price).toFixed(2)}</td>
                <td>${Number(e.bookings_count)}</td>
                <td>$${Number(e.revenue).toFixed(2)}</td>
                <td><span class="badge badge-${e.status === 'active' ? 'success' : 'danger'}">${escapeHtml(e.status)}</span></td>
                <td>
                    <button class="btn btn-sm" onclick='openEventModal(${JSON.stringify(e)})'>Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteEvent(${e.id})">Delete</button>
                </td>
            </tr>`).join('') : '<tr><td colspan="8" class="empty">No events</td></tr>'}</tbody>
    `;
}
function openEventModal(ev = null) {
    const form = document.getElementById('event-form');
    form.reset();
    document.getElementById('event-modal-title').textContent = ev ? 'Edit Event' : 'New Event';
    if (ev) {
        for (const k of ['id','title','genre','description','event_date','event_time','venue','image_url','ticket_price','capacity','status']) {
            if (form[k]) form[k].value = ev[k] || '';
        }
    } else form.id.value = '';
    document.getElementById('event-modal').classList.add('active');
}
document.getElementById('event-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    const id = data.id; delete data.id;
    await api(id ? `/events/${id}` : '/events', { method: id ? 'PUT' : 'POST', body: data });
    closeModal('event-modal');
    loadEvents();
});
async function deleteEvent(id) {
    if (!confirm('Delete this event?')) return;
    await api('/events/' + id, { method: 'DELETE' });
    loadEvents();
}

// ===== BOOKINGS =====
async function loadBookings() {
    const rows = await api('/bookings');
    if (!rows) return;
    document.getElementById('bookings-table').innerHTML = `
        <thead><tr><th>Customer</th><th>Event</th><th>Qty</th><th>Total</th><th>Status</th><th>Date</th><th></th></tr></thead>
        <tbody>${rows.length ? rows.map(b => `
            <tr>
                <td>${escapeHtml(b.first_name) || '?'} ${escapeHtml(b.last_name) || ''}<br><small style="color:#888">${escapeHtml(b.email) || ''}</small></td>
                <td>${escapeHtml(b.event_title) || '—'}</td>
                <td>${Number(b.quantity)}</td>
                <td>$${Number(b.total_price).toFixed(2)}</td>
                <td>
                    <select onchange="updateBookingStatus(${b.id}, this.value)" style="background:rgba(255,255,255,0.05);color:white;border:1px solid var(--border);padding:4px;">
                        <option ${b.status==='confirmed'?'selected':''}>confirmed</option>
                        <option ${b.status==='cancelled'?'selected':''}>cancelled</option>
                        <option ${b.status==='refunded'?'selected':''}>refunded</option>
                    </select>
                </td>
                <td>${escapeHtml(b.booking_date.split(' ')[0])}</td>
                <td><button class="btn btn-sm btn-danger" onclick="deleteBooking(${b.id})">Delete</button></td>
            </tr>`).join('') : '<tr><td colspan="7" class="empty">No bookings</td></tr>'}</tbody>
    `;
}
async function updateBookingStatus(id, status) { await api('/bookings/' + id, { method: 'PUT', body: { status } }); }
async function deleteBooking(id) {
    if (!confirm('Delete this booking?')) return;
    await api('/bookings/' + id, { method: 'DELETE' });
    loadBookings();
}

async function updateReservationStatus(id, status) { await api('/reservations/' + id, { method: 'PUT', body: { status } }); }
async function deleteReservation(id) {

// ===== MESSAGES =====
async function loadMessages() {
    const rows = await api('/messages');
    if (!rows) return;
    document.getElementById('messages-table').innerHTML = `
        <thead><tr><th>From</th><th>Subject</th><th>Message</th><th>Status</th><th>Date</th><th></th></tr></thead>
        <tbody>${rows.length ? rows.map(m => `
            <tr style="${m.status === 'unread' ? 'background:rgba(197,160,89,0.05);' : ''}">
                <td><strong>${escapeHtml(m.name)}</strong><br><small style="color:#888">${escapeHtml(m.email)}</small></td>
                <td>${escapeHtml(m.subject) || '—'}</td>
                <td style="max-width:300px;">${escapeHtml(m.message)}</td>
                <td>
                    <select onchange="updateMessageStatus(${m.id}, this.value)" style="background:rgba(255,255,255,0.05);color:white;border:1px solid var(--border);padding:4px;">
                        <option ${m.status==='unread'?'selected':''}>unread</option>
                        <option ${m.status==='read'?'selected':''}>read</option>
                        <option ${m.status==='replied'?'selected':''}>replied</option>
                    </select>
                </td>

                <td><button class="btn btn-sm btn-danger" onclick="deleteMessage(${m.id})">Delete</button></td>
            </tr>`).join('') : '<tr><td colspan="6" class="empty">No messages</td></tr>'}</tbody>
    `;
}
async function updateMessageStatus(id, status) { await api('/messages/' + id, { method: 'PUT', body: { status } }); }
async function deleteMessage(id) {
    if (!confirm('Delete this message?')) return;
    await api('/messages/' + id, { method: 'DELETE' });
    loadMessages();
}

// ===== SUBSCRIBERS =====
async function loadSubscribers() {
    const rows = await api('/subscribers');
    if (!rows) return;
    document.getElementById('subscribers-table').innerHTML = `
        <thead><tr><th>Email</th><th>Subscribed</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows.length ? rows.map(s => `
            <tr>
                <td>${escapeHtml(s.email)}</td>
                <td>${escapeHtml(s.subscribed_at.split(' ')[0])}</td>
                <td><span class="badge badge-${s.active ? 'success' : 'danger'}">${s.active ? 'active' : 'unsubscribed'}</span></td>
                <td><button class="btn btn-sm btn-danger" onclick="deleteSubscriber(${s.id})">Remove</button></td>
            </tr>`).join('') : '<tr><td colspan="4" class="empty">No subscribers</td></tr>'}</tbody>
    `;
}
async function deleteSubscriber(id) {
    if (!confirm('Remove this subscriber?')) return;
    await api('/subscribers/' + id, { method: 'DELETE' });
    loadSubscribers();
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// Initial load
loadDashboard();
