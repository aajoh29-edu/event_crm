<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | Classic Productions</title>
    <style>
        :root { --gold: #c5a059; --dark: #121212; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: var(--dark); color: white; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(197,160,89,0.3);
            padding: 50px 40px; border-radius: 6px; width: 100%; max-width: 400px;
        }
        h1 { color: var(--gold); text-align: center; margin-bottom: 30px; letter-spacing: 3px; text-transform: uppercase; font-size: 1.4rem; }
        label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--gold); text-transform: uppercase; }
        input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(197,160,89,0.3);
            color: white; font-size: 1rem;
        }
        button {
            width: 100%; padding: 14px; background: linear-gradient(45deg, #c5a059, #e2c285);
            color: var(--dark); border: none; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .error { color: #f44336; text-align: center; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Classic CRM</h1>
        <form id="login-form">
            <label>Username</label>
            <input type="text" name="username" required autofocus autocomplete="username">
            <label>Password</label>
            <input type="password" name="password" required autocomplete="current-password">
            <button type="submit">Sign In</button>
            <div class="error" id="error"></div>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('error');
            errorEl.textContent = '';
            const data = Object.fromEntries(new FormData(e.target));
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
                credentials: 'same-origin'
            });
            const result = await res.json();
            if (res.ok && result.success) {
                window.location.href = '/admin';
            } else {
                errorEl.textContent = result.error || 'Login failed';
            }
        });
    </script>
</body>
</html>
