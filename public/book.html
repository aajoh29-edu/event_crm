<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Productions | Book Now</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOK5K+g==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      --gold: #c5a059; --gold-light: #e2c285;
      --cream: #f4f1ea; --dark: #121212; --white: #fff;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; }
    body { background:var(--dark); color:var(--white); min-height:100vh; }

    header {
      background:rgba(18,18,18,.96); border-bottom:1px solid rgba(197,160,89,.25);
      padding:20px 8%; display:flex; align-items:center; justify-content:space-between;
    }
    .logo { font-size:1.3rem; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:3px; }
    .logo a { color:inherit; text-decoration:none; }
    .ref-badge {
      font-size:.75rem; color:var(--gold); border:1px solid rgba(197,160,89,.4);
      padding:5px 12px; border-radius:20px; text-transform:uppercase; letter-spacing:1px;
    }

    .hero-bar {
      background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
                 url('https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?auto=format&fit=crop&w=1920&q=80');
      background-size:cover; background-position:center;
      padding:60px 8%; text-align:center;
    }
    .hero-bar h1 { font-size:clamp(1.8rem,4vw,3rem); margin-bottom:8px; }
    .hero-bar p  { color:var(--gold); font-style:italic; }

    .container { max-width:1100px; margin:0 auto; padding:60px 8%; }

    /* ── Events grid ── */
    .section-title {
      font-size:1.6rem; text-transform:uppercase; letter-spacing:2px;
      color:var(--gold); margin-bottom:30px; padding-bottom:12px;
      border-bottom:1px solid rgba(197,160,89,.25);
    }
    .events-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:28px; margin-bottom:60px; }
    .event-card {
      background:rgba(255,255,255,.04); border:1px solid rgba(197,160,89,.2);
      border-radius:4px; overflow:hidden; transition:.3s;
    }
    .event-card:hover { transform:translateY(-4px); border-color:var(--gold); }
    .event-img  { height:180px; background-size:cover; background-position:center; position:relative; }
    .date-tag   {
      position:absolute; top:0; right:0; background:var(--dark);
      color:var(--gold); padding:8px 12px; font-weight:700; font-size:.85rem; text-align:center;
    }
    .event-body { padding:20px; }
    .genre-tag  { color:var(--gold); font-size:.75rem; text-transform:uppercase; font-weight:700; letter-spacing:1px; }
    .event-body h3 { font-size:1.1rem; margin:6px 0; }
    .event-meta { font-size:.85rem; color:#aaa; margin:6px 0 14px; }
    .btn-gold {
      display:inline-block; padding:10px 22px;
      background:linear-gradient(45deg,var(--gold),var(--gold-light));
      color:var(--dark); font-weight:700; text-transform:uppercase;
      font-size:.8rem; border:none; border-radius:3px; cursor:pointer; transition:.3s;
    }
    .btn-gold:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.4); }
    .btn-outline {
      background:none; border:1px solid var(--gold); color:var(--gold);
      padding:10px 22px; font-size:.8rem; border-radius:3px; cursor:pointer;
      text-transform:uppercase; font-weight:700; transition:.3s;
    }
    .btn-outline:hover { background:var(--gold); color:var(--dark); }

    /* ── Modals ── */
    .modal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.88);
      z-index:1000; justify-content:center; align-items:center; padding:20px;
    }
    .modal.active { display:flex; }
    .modal-box {
      background:#1a1a1a; border:1px solid rgba(197,160,89,.3);
      padding:36px; max-width:540px; width:100%; max-height:90vh;
      overflow-y:auto; border-radius:6px; position:relative;
    }
    .modal-box h3 { color:var(--gold); margin-bottom:6px; font-size:1.3rem; }
    .modal-box .sub { color:#aaa; font-size:.9rem; margin-bottom:24px; font-style:italic; }
    .modal-close { position:absolute; top:12px; right:16px; font-size:1.6rem; background:none; border:none; color:#888; cursor:pointer; }
    .modal-close:hover { color:var(--white); }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:.8rem; text-transform:uppercase; letter-spacing:1px; color:var(--gold); margin-bottom:6px; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:11px; background:rgba(255,255,255,.05);
      border:1px solid rgba(197,160,89,.3); color:var(--white);
      font-size:.95rem; border-radius:3px;
    }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-status { margin-top:14px; padding:11px; border-radius:3px; display:none; font-size:.9rem; }
    .form-status.success { display:block; background:rgba(76,175,80,.15); color:#4caf50; border:1px solid #4caf50; }
    .form-status.error   { display:block; background:rgba(244,67,54,.15); color:#f44336; border:1px solid #f44336; }

    /* ── Reserve section ── */
    .reserve-section {
      background:rgba(255,255,255,.03); border:1px solid rgba(197,160,89,.18);
      border-radius:6px; padding:40px; margin-top:20px;
    }
    .reserve-section h2 { color:var(--gold); margin-bottom:6px; }
    .reserve-section .sub { color:#aaa; margin-bottom:28px; font-style:italic; }
    .res-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .res-grid .full { grid-column:1/-1; }

    footer {
      text-align:center; padding:40px 8% 24px;
      border-top:2px solid rgba(197,160,89,.3); margin-top:60px;
      font-size:.8rem; color:#555;
    }
    @media(max-width:600px){
      .form-row,.res-grid{ grid-template-columns:1fr; }
      .res-grid .full { grid-column:1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><a href="/">Classic<span style="color:#fff">+</span>Productions</a></div>
  <span class="ref-badge" id="ref-badge" style="display:none">Referred by <strong id="ref-name"></strong></span>
</header>

<div class="hero-bar">
  <h1>Book Your Experience</h1>
  <p>Washington D.C. &amp; Baltimore's Premier Hip-Hop &amp; R&amp;B Events</p>
</div>

<div class="container">

  <!-- ── Upcoming Events ── -->
  <div class="section-title">Upcoming Events</div>
  <div class="events-grid" id="events-grid">
    <p style="color:#666">Loading events&hellip;</p>
  </div>

  <!-- ── Table Reservations ── -->
  <div class="reserve-section">
    <h2>Reserve a Table</h2>
    <p class="sub">VIP and standard seating — all events.</p>
    <form id="res-form">
      <input type="hidden" name="ref" id="res-ref">
      <div class="res-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" required maxlength="150">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required maxlength="200">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" maxlength="30">
        </div>
        <div class="form-group">
          <label>Party Size</label>
          <input type="number" name="party_size" min="1" max="20" value="2" required>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" name="reservation_date" required>
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" name="reservation_time">
        </div>
        <div class="form-group full">
          <label>Table Type</label>
          <select name="table_type">
            <option value="standard">Standard</option>
            <option value="premium">Premium</option>
            <option value="vip">VIP Booth</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Special Requests</label>
          <textarea name="special_requests" rows="3" maxlength="1000"></textarea>
        </div>
        <div class="form-group full">
          <button type="submit" class="btn-gold" style="width:100%;padding:14px;">Reserve Table</button>
          <div class="form-status" id="res-status"></div>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- ── Ticket Booking Modal ── -->
<div class="modal" id="book-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modal-title">Book Tickets</h3>
    <p class="sub" id="modal-sub"></p>
    <form id="book-form">
      <input type="hidden" name="event_id" id="modal-event-id">
      <input type="hidden" name="ref"      id="modal-ref">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full_name" required maxlength="150">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required maxlength="200">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" maxlength="30">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" name="quantity" min="1" max="20" value="1" required id="qty-input">
        </div>
        <div class="form-group">
          <label>Total</label>
          <input type="text" id="modal-total" readonly value="$0.00">
        </div>
      </div>
      <button type="submit" class="btn-gold" style="width:100%;padding:14px;margin-top:8px;">Confirm Booking</button>
      <div class="form-status" id="book-status"></div>
    </form>
  </div>
</div>

<footer>&copy; 2026 CLASSIC PRODUCTIONS. WASHINGTON D.C. | BALTIMORE.</footer>

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────────
  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function safeCss(url) {
    return url ? String(url).replace(/['"\\()]/g,'') : '';
  }

  // ── Read promoter ref from URL ────────────────────────────────────────────────
  const params    = new URLSearchParams(window.location.search);
  const refToken  = params.get('ref') || '';
  let   promoterName = '';

  async function resolveRef() {
    if (!refToken) return;
    try {
      const r = await fetch('/api/verify-ref?ref=' + encodeURIComponent(refToken));
      if (!r.ok) return;
      const d = await r.json();
      if (d.promoter_name) {
        promoterName = d.promoter_name;
        document.getElementById('ref-name').textContent   = d.promoter_name;
        document.getElementById('ref-badge').style.display = 'inline-block';
      }
    } catch (_) {}
  }

  // ── Load events ───────────────────────────────────────────────────────────────
  let eventsCache = [];
  async function loadEvents() {
    try {
      const r = await fetch('/api/events');
      if (!r.ok) throw new Error();
      const events = await r.json();
      eventsCache  = events;
      const grid = document.getElementById('events-grid');
      if (!events.length) {
        grid.innerHTML = '<p style="color:#666">No upcoming events. Check back soon.</p>';
        return;
      }
      grid.innerHTML = events.map(e => {
        const d     = new Date(e.event_date + 'T00:00:00');
        const month = d.toLocaleString('en',{month:'short'}).toUpperCase();
        const day   = d.getDate().toString().padStart(2,'0');
        return `
          <div class="event-card">
            <div class="event-img" style="background-image:url('${safeCss(e.image_url)}')">
              <div class="date-tag">${month}<br>${day}</div>
            </div>
            <div class="event-body">
              <div class="genre-tag">${esc(e.genre)}</div>
              <h3>${esc(e.title)}</h3>
              <p class="event-meta">$${Number(e.ticket_price).toFixed(2)} &bull; ${esc(e.venue)}</p>
              <button class="btn-gold" onclick="openBooking(${Number(e.id)})">Book Tickets</button>
            </div>
          </div>`;
      }).join('');
    } catch (_) {
      document.getElementById('events-grid').innerHTML =
        '<p style="color:#f44336">Could not load events. Please try again later.</p>';
    }
  }

  // ── Booking modal ─────────────────────────────────────────────────────────────
  function openBooking(id) {
    const ev = eventsCache.find(e => e.id === id);
    if (!ev) return;
    document.getElementById('modal-event-id').value  = ev.id;
    document.getElementById('modal-ref').value        = refToken;
    document.getElementById('modal-title').textContent = 'Book: ' + ev.title;
    document.getElementById('modal-sub').textContent   =
      ev.event_date + ' • $' + Number(ev.ticket_price).toFixed(2) + ' per ticket';
    document.getElementById('modal-total').value = '$' + Number(ev.ticket_price).toFixed(2);
    document.getElementById('book-status').className = 'form-status';
    document.getElementById('book-form').reset();
    document.getElementById('modal-event-id').value = ev.id;
    document.getElementById('modal-ref').value       = refToken;

    document.getElementById('qty-input').oninput = e => {
      const qty = Math.max(1, Math.min(20, parseInt(e.target.value) || 1));
      document.getElementById('modal-total').value =
        '$' + (qty * ev.ticket_price).toFixed(2);
    };
    document.getElementById('book-modal').classList.add('active');
  }
  function closeModal() { document.getElementById('book-modal').classList.remove('active'); }

  // ── Form submission helper ────────────────────────────────────────────────────
  async function submitForm(formEl, url, statusEl) {
    const data = Object.fromEntries(new FormData(formEl));
    statusEl.className = 'form-status';
    try {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const res = await r.json();
      if (r.ok && res.success) {
        statusEl.className   = 'form-status success';
        statusEl.textContent = '✓ Success! We\'ll see you there.';
        formEl.reset();
      } else {
        statusEl.className   = 'form-status error';
        statusEl.textContent = res.error || 'Something went wrong. Please try again.';
      }
    } catch (_) {
      statusEl.className   = 'form-status error';
      statusEl.textContent = 'Network error. Please check your connection.';
    }
  }

  document.getElementById('book-form').addEventListener('submit', e => {
    e.preventDefault();
    submitForm(e.target, '/api/bookings', document.getElementById('book-status'));
  });

  document.getElementById('res-form').addEventListener('submit', e => {
    e.preventDefault();
    document.getElementById('res-ref').value = refToken;
    submitForm(e.target, '/api/reservations', document.getElementById('res-status'));
  });

  // ── Boot ──────────────────────────────────────────────────────────────────────
  resolveRef();
  loadEvents();
</script>
<script src="/preference-game.js"></script>
</body>
</html>
