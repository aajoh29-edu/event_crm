<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0518"/>
      <stop offset="50%"  stop-color="#130820"/>
      <stop offset="100%" stop-color="#060208"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f5d47a"/>
      <stop offset="40%"  stop-color="#e2a83a"/>
      <stop offset="100%" stop-color="#9a6b10"/>
    </linearGradient>
    <linearGradient id="purpleText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d4a8ff"/>
      <stop offset="100%" stop-color="#9b59b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%"  stop-color="#7b3fa0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f0518" stop-opacity="0"/>
    </radialGradient>
    <pattern id="diamonds" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <polygon points="20,2 38,20 20,38 2,20" fill="none" stroke="#7b3fa0" stroke-width="0.6" opacity="0.2"/>
      <circle cx="20" cy="20" r="2" fill="#7b3fa0" opacity="0.1"/>
    </pattern>
    <pattern id="kente" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="none"/>
      <rect x="0" y="0" width="6" height="6" fill="#e2a83a" opacity="0.15"/>
      <rect x="6" y="6" width="6" height="6" fill="#7b3fa0" opacity="0.15"/>
    </pattern>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.7 0 0.8 0 0.2  0 0 0.6 0 0  0.5 0 0.9 0 0.3  0 0 0 0.85 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#diamonds)"/>
  <rect width="600" height="400" fill="url(#glow)"/>

  <!-- Kente borders -->
  <rect x="0" y="0" width="600" height="8" fill="url(#kente)"/>
  <rect x="0" y="392" width="600" height="8" fill="url(#kente)"/>
  <rect x="0" y="0" width="8" height="400" fill="url(#kente)"/>
  <rect x="592" y="0" width="8" height="400" fill="url(#kente)"/>

  <!-- Corner diamonds -->
  <polygon points="28,28 42,14 56,28 42,42" fill="none" stroke="#7b3fa0" stroke-width="1.2" opacity="0.55"/>
  <polygon points="572,28 558,14 544,28 558,42" fill="none" stroke="#7b3fa0" stroke-width="1.2" opacity="0.55"/>
  <polygon points="28,372 42,386 56,372 42,358" fill="none" stroke="#7b3fa0" stroke-width="1.2" opacity="0.55"/>
  <polygon points="572,372 558,386 544,372 558,358" fill="none" stroke="#7b3fa0" stroke-width="1.2" opacity="0.55"/>

  <!-- Angular geometric accents (industry/movement feel) -->
  <polygon points="300,30 320,50 300,70 280,50" fill="none" stroke="#e2a83a" stroke-width="0.8" opacity="0.3"/>
  <polygon points="300,330 320,350 300,370 280,350" fill="none" stroke="#e2a83a" stroke-width="0.8" opacity="0.3"/>

  <!-- Concentric arcs -->
  <circle cx="300" cy="200" r="138" fill="none" stroke="#7b3fa0" stroke-width="0.5" opacity="0.15"/>
  <circle cx="300" cy="200" r="153" fill="none" stroke="#e2a83a" stroke-width="0.5" opacity="0.08"/>

  <!-- Horizontal rules -->
  <line x1="40" y1="138" x2="200" y2="138" stroke="#e2a83a" stroke-width="0.8" opacity="0.35"/>
  <line x1="400" y1="138" x2="560" y2="138" stroke="#e2a83a" stroke-width="0.8" opacity="0.35"/>
  <line x1="40" y1="278" x2="200" y2="278" stroke="#7b3fa0" stroke-width="0.8" opacity="0.35"/>
  <line x1="400" y1="278" x2="560" y2="278" stroke="#7b3fa0" stroke-width="0.8" opacity="0.35"/>

  <!-- Diamond accents -->
  <polygon points="300,130 308,138 300,146 292,138" fill="#e2a83a" opacity="0.55"/>
  <polygon points="300,270 308,278 300,286 292,278" fill="#7b3fa0" opacity="0.55"/>

  <!-- Tagline above -->
  <text x="300" y="162" font-family="Georgia,'Times New Roman',serif" font-size="10"
    fill="#e2a83a" text-anchor="middle" letter-spacing="7" opacity="0.75">◆ AN EXCLUSIVE EXPERIENCE ◆</text>

  <!-- Main title: INDUSTRY NIGHT -->
  <text x="300" y="208" font-family="Georgia,'Times New Roman',serif" font-size="44"
    font-weight="700" fill="url(#goldText)" text-anchor="middle" letter-spacing="3"
    filter="url(#textGlow)">INDUSTRY NIGHT</text>

  <!-- Divider line between title and subtitle -->
  <line x1="160" y1="222" x2="440" y2="222" stroke="#e2a83a" stroke-width="0.6" opacity="0.3"/>

  <!-- Sub title: CLASSIC PRODUCTIONS -->
  <text x="300" y="250" font-family="'Arial Narrow',Arial,sans-serif" font-size="22"
    font-weight="300" fill="url(#purpleText)" text-anchor="middle" letter-spacing="10" opacity="0.9">
    CLASSIC PRODUCTIONS
  </text>

  <!-- Tagline below -->
  <text x="300" y="300" font-family="Georgia,'Times New Roman',serif" font-size="10.5"
    fill="#e2a83a" text-anchor="middle" letter-spacing="4" opacity="0.65">
    PENDRY BALTIMORE  ·  HARBOR EAST
  </text>

  <!-- Dot accents -->
  <circle cx="100" cy="200" r="2.5" fill="#7b3fa0" opacity="0.3"/>
  <circle cx="500" cy="200" r="2.5" fill="#7b3fa0" opacity="0.3"/>
  <circle cx="88"  cy="200" r="1.5" fill="#7b3fa0" opacity="0.18"/>
  <circle cx="512" cy="200" r="1.5" fill="#7b3fa0" opacity="0.18"/>
</svg>
